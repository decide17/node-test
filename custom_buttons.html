

<div class="container mx-auto my-3 px-4">
    <div class="bg-white shadow-sm rounded-lg overflow-hidden">
        <div class="p-4 border-b bg-gray-800 text-white">
            <h5 class="text-lg font-bold mb-0">RF Output</h5>
        </div>
        <div class="p-4">
            <div class="grid grid-cols-4 gap-2 mb-4">
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay1Btn" onclick="toggleRelay(1)">RELAY 1</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay2Btn" onclick="toggleRelay(2)">RELAY 2</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay3Btn" onclick="toggleRelay(3)">RELAY 3</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay4Btn" onclick="toggleRelay(4)">RELAY 4</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay5Btn" onclick="toggleRelay(5)">HPA RELAY</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay6Btn" onclick="toggleRelay(6)">HPB RELAY</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay7Btn" onclick="toggleRelay(7)">RF LOAD</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="relay8Btn" onclick="toggleRelay(8)">RF COM</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="function3Btn" onclick="sendPwmOn()">PWM ON</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn" id="function4Btn" onclick="sendPwmOff()">PWM OFF</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn">기능 11</button>
                <button type="button" class="bg-gray-500 hover:bg-gray-700 text-white font-bold py-2 px-4 rounded custom-toggle-btn">기능 12</button>
            </div>
            <div class="flex items-center mb-4">
                                <label for="pwm-slider" class="font-medium text-gray-700 mr-3 mb-0 w-24 flex-shrink-0">PWM (0-50)</label>
                                <input type="range" class="flex-grow h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" min="0" max="50" step="0.1" value="50.0" id="pwm-slider">
                                <input id="pwm-value" type="number" min="0" max="50" step="0.1" value="50.0" class="ml-2 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" style="width: 70px;">
                                <button id="send-pwm" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded ml-4">전송</button>
                            </div>
            <div class="flex items-center mb-4">
                <label class="font-medium text-gray-700 mr-3 mb-0 w-24 flex-shrink-0">RF (MHz)</label>
                <div class="flex items-center space-x-4">
                    <div>
                        <input type="radio" id="mhz-1" name="rf-mhz-value" value="1" class="form-radio h-4 w-4 text-blue-600" checked>
                        <label for="mhz-1" class="ml-1">1</label>
                    </div>
                    <div>
                        <input type="radio" id="mhz-3" name="rf-mhz-value" value="3" class="form-radio h-4 w-4 text-blue-600">
                        <label for="mhz-3" class="ml-1">3</label>
                    </div>
                    <div>
                        <input type="radio" id="mhz-6.78" name="rf-mhz-value" value="6.78" class="form-radio h-4 w-4 text-blue-600">
                        <label for="mhz-6.78" class="ml-1">6.78</label>
                    </div>
                    <div>
                        <input type="radio" id="mhz-7" name="rf-mhz-value" value="7" class="form-radio h-4 w-4 text-blue-600">
                        <label for="mhz-7" class="ml-1">7</label>
                    </div>
                </div>
                <button id="send-rf-mhz" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded ml-auto">전송</button>
            </div>
            <div class="flex items-center mb-4">
                <label for="irradiation-time-slider" class="font-medium text-gray-700 mr-3 mb-0 w-24 flex-shrink-0">조사시간 (0-2000)</label>
                <input type="range" class="flex-grow h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer" min="0" max="2000" step="1" value="50" id="irradiation-time-slider">
                <input id="irradiation-time-value" type="number" min="0" max="2000" step="1" value="50" class="ml-2 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-blue-500 dark:focus:border-blue-500" style="width: 70px;">
                <button id="send-irradiation-time" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded ml-4">전송</button>
            </div>
            <div class="flex flex-wrap -mx-2 mt-4">
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>InPut Current</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-cyan-500 text-white" id="rf-INPUT_CURRENT">0.00 A</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>OutPut Current</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-cyan-500 text-white" id="rf-OUTPUT_CURRENT">0.00 A</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>InPut Volt</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-green-500 text-white" id="rf-INPUT_VOLT">0.00 V</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>OutPut Volt</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-green-500 text-white" id="rf-OUTPUT_VOLT">0.00 V</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>VI_PHASE</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-cyan-500 text-white" id="rf-VI_PHASE">0.00</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>RF_2S_VOLTAGE</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-cyan-500 text-white" id="rf-RF_2S_VOLTAGE">0.00</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>VOLT_V12_</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-green-500 text-white" id="rf-VOLT_V12_">0.00 V</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>VOLT_V12</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-green-500 text-white" id="rf-VOLT_V12">0.00 V</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>VOLT_V5</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-green-500 text-white" id="rf-VOLT_V5">0.00 V</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>VOLT_V5_</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-green-500 text-white" id="rf-VOLT_V5_">0.00 V</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>CURR_VRF</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 rounded-full bg-yellow-500 text-black" id="rf-CURR_VRF">0.00 A</span>
                    </div>
                </div>
                <div class="w-full md:w-1/4 px-2 mb-2">
                    <div class="flex justify-between items-center border p-2 rounded">
                        <small>NTC_RF</small>
                        <span class="text-xs font-semibold inline-block py-1 px-2 uppercase rounded-full bg-red-500 text-white" id="rf-NTC_RF">0.00 °C</span>
                    </div>
                </div>
            </div>
            <div class="flex items-center justify-around">
                <div class="flex items-center">
                    <h6 class="text-sm text-gray-500 mr-2">PWM:</h6>
                    <p class="text-lg font-bold" id="rf-display-pwm">-</p>
                </div>
                <div class="flex items-center">
                    <h6 class="text-sm text-gray-500 mr-2">Frequency (Hz):</h6>
                    <p class="text-lg font-bold" id="rf-display-hz">-</p>
                </div>
            </div>
        </div>
    </div>
</div>
