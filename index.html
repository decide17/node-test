<script>
    function initValueSetter() {
        const slider = document.getElementById('value-slider');
        const input = document.getElementById('value-input');

        if (slider && input) {
            slider.addEventListener('input', (event) => {
                input.value = event.target.value;
            });

            input.addEventListener('input', (event) => {
                slider.value = event.target.value;
            });
        }
    }

    const loadModule = (url, placeholderId) => {
        return fetch(url)
            .then(response => response.text())
            .then(data => {
                document.getElementById(placeholderId).innerHTML = data;
            })
            .catch(error => console.error(`Error loading ${url}:`, error));
    };

    Promise.all([
        loadModule('./telemetry.html', 'telemetry-display-placeholder'),
        loadModule('./custom_buttons.html', 'custom-buttons-placeholder'),
        loadModule('./value_setter.html', 'value-setter-placeholder'),
        // loadModule('./oscilloscope_simulator.html', 'custom-oscilloscope_simulator-placeholder'),
    ]).then(() => {
        // All modules loaded, now initialize their JS
        initValueSetter();
        initPwmControl();
        // initOscilloscopeSimulator();
    });

    function initPwmControl() {
        const pwmSlider = document.getElementById('pwm-slider');
        const pwmValue = document.getElementById('pwm-value');
        const sendPwmBtn = document.getElementById('send-pwm');

        if (pwmSlider && pwmValue && sendPwmBtn) {
            pwmSlider.addEventListener('input', (event) => {
                pwmValue.textContent = parseFloat(event.target.value).toFixed(1);
            });

            sendPwmBtn.addEventListener('click', () => {
                const value = parseFloat(pwmSlider.value) * 10;
                console.log('Sending PWM value:', value);
                sendPwmModbus(value);
            });
        }
    }

    window.addEventListener('modbusData', (event) => {
        const {
            forwardCurrent,
            forwardVolt,
            forwardWatt,
            VI_PHASE_DIFFERENCE_A,
            RF_2S_VOLTAGE,
            VOLT_V12_,
            VOLT_V12,
            VOLT_V5,
            VOLT_V5_,
            CURR_VRF,
            NTC_RF,
            PWM,
            Hz
        } = event.detail;

        const updateElement = (id, value, unit = '') => {
            const element = document.getElementById(id);
            if (element) {
                element.textContent = value.toFixed(2) + unit;
            }
        };

        updateElement('VI_PHASE_DIFFERENCE_A', VI_PHASE_DIFFERENCE_A);
        updateElement('RF_2S_VOLTAGE', RF_2S_VOLTAGE);
        updateElement('VOLT_V12_', VOLT_V12_, ' V');
        updateElement('VOLT_V12', VOLT_V12, ' V');
        updateElement('VOLT_V5', VOLT_V5, ' V');
        updateElement('VOLT_V5_', VOLT_V5_, ' V');
        updateElement('CURR_VRF', CURR_VRF, ' A');
        updateElement('NTC_RF', NTC_RF, ' °C');

        const pwmDisplay = document.getElementById('display-pwm');
        const hzDisplay = document.getElementById('display-hz');

        if (pwmDisplay) {
            pwmDisplay.textContent = PWM;
        }
        if (hzDisplay) {
            hzDisplay.textContent = Hz;
        }
    });

</script>
