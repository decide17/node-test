<script>


    function saveLog() {
        const textToSave = document.getElementById('freeform').value;
        const blob = new Blob([textToSave], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'log.txt';
        a.click();
        URL.revokeObjectURL(url);
    }

    const loadModule = (url, placeholderId) => {
        return fetch(url)
            .then(response => response.text())
            .then(data => {
                document.getElementById(placeholderId).innerHTML = data;
            })
            .catch(error => console.error(`Error loading ${url}:`, error));
    };

    Promise.all([
        loadModule('./serial_controls.html', 'serial-controls-placeholder'),
        loadModule('./firmware_update.html', 'firmware-update-placeholder'),
        loadModule('./telemetry.html', 'telemetry-display-placeholder'),
        // loadModule('./custom_buttons.html', 'custom-buttons-placeholder'),

        // loadModule('./oscilloscope_simulator.html', 'custom-oscilloscope_simulator-placeholder'),
    ]).then(() => {
        // All modules loaded, now initialize their JS
        setTimeout(() => {
            listSerialPorts();
            initPwmControl();
            initTelemetryPwmControl(); // Empty placeholder
            initChopperKhzControl();  // Empty placeholder
            initLineCartridgeControl(); // Newly added
            initPenCartridgeControl();
            initRfTipControl();
            initRfMhzControl();

            initIrradiationTimeControl();
            // initOscilloscopeSimulator();

            const saveLogBtn = document.getElementById('save-log-btn');
            if (saveLogBtn) {
                saveLogBtn.addEventListener('click', saveLog);
            }

            const scanPortsBtn = document.getElementById('scan-ports-btn');
            if (scanPortsBtn) {
                scanPortsBtn.addEventListener('click', listSerialPorts);
            }

            // Bind SCAN buttons
            const lcScanBtn = document.getElementById('lc-scan-btn');
            if (lcScanBtn) {
                lcScanBtn.addEventListener('click', () => {
                    if (typeof scanLineCartridge === 'function') scanLineCartridge();
                    else console.error('scanLineCartridge function not found');
                });
            }

            const pcScanBtn = document.getElementById('pc-scan-btn');
            if (pcScanBtn) {
                pcScanBtn.addEventListener('click', () => {
                    if (typeof scanPenCartridge === 'function') scanPenCartridge();
                    else console.error('scanPenCartridge function not found');
                });
            }

            const rtScanBtn = document.getElementById('rt-scan-btn');
            if (rtScanBtn) {
                rtScanBtn.addEventListener('click', () => {
                    if (typeof scanRfTip === 'function') scanRfTip();
                    else console.error('scanRfTip function not found');
                });
            }
        }, 100); // 100ms delay
    });

    function initPwmControl() {
        const pwmSlider = document.getElementById('pwm-slider');
        const pwmValueInput = document.getElementById('pwm-value');
        const sendPwmBtn = document.getElementById('send-pwm');

        if (pwmSlider && pwmValueInput && sendPwmBtn) {
            pwmSlider.addEventListener('input', (event) => {
                pwmValueInput.value = parseFloat(event.target.value).toFixed(1);
            });

            pwmValueInput.addEventListener('input', (event) => {
                let value = parseFloat(event.target.value);
                const min = parseFloat(event.target.min);
                const max = parseFloat(event.target.max);

                if (isNaN(value)) {
                    value = 50;
                } else if (value < min) {
                    value = min;
                } else if (value > max) {
                    value = max;
                }
                event.target.value = value;
                pwmSlider.value = value;
            });

            sendPwmBtn.addEventListener('click', () => {
                const value = parseFloat(pwmSlider.value) * 10;
                console.log('Sending PWM value:', value);
                sendPwmModbus(1, value);
            });
        }
    }



    function initLineCartridgeControl() {
        console.log("Initializing Line Cartridge Controls...");

        const sendCurrentLcSettings = () => {
            const country = parseInt(document.getElementById('lc-country-input').value, 10) || 0;

            const power = parseInt(document.getElementById('lc-power-input').value, 10) || 0;

            // console.log(`Sending LC Settings: MHz=${mhz}, Depth=${depth}, Country=${country}, Power=${power}`);
            if (typeof sendLineCartridgeInfo === 'function') {
                sendLineCartridgeInfo(mhz, depth, country, power);

                console.error("sendLineCartridgeInfo function not found");
            }
        };

        // Unified Set Info Button
        const infoSetBtn = document.getElementById('lc-info-set-btn');
        if (infoSetBtn) {
            infoSetBtn.onclick = sendCurrentLcSettings;
        }

        // Serial
        // Serial
        const serialBtn = document.getElementById('lc-serial-set-btn');
        if (serialBtn) {
            serialBtn.onclick = () => {
                let value = document.getElementById('lc-serial-input').value.trim();
                // Sanitize: remove non-hex, pad to 16 chars (8 bytes effective serial)
                value = value.replace(/[^0-9A-Fa-f]/g, '');
                if (value.length > 16) echo = value.substring(0, 16);
                const sanitized = value.padStart(16, '0').substring(0, 16).toUpperCase();

                document.getElementById('lc-serial-input').value = sanitized;
                console.log('Sending Line Cartridge Serial:', sanitized);
                sendLineCartridgeSerial(sanitized);
            };
        }

        // Total Shot
        const totalShotBtn = document.getElementById('lc-total-shot-set-btn');
        if (totalShotBtn) {
            totalShotBtn.addEventListener('click', () => {
                const value = parseInt(document.getElementById('lc-total-shot-input').value, 10);
                if (!isNaN(value)) {
                    console.log('Sending Line Cartridge Total Shot:', value);
                    sendLineCartridgeTotalShot(value);
                }
            });
        }

        // Rem Shot
        const remShotBtn = document.getElementById('lc-rem-shot-set-btn');
        if (remShotBtn) {
            remShotBtn.addEventListener('click', () => {
                const value = parseInt(document.getElementById('lc-rem-shot-input').value, 10);
                if (!isNaN(value)) {
                    const currentRemShotStr = document.getElementById('lc-rem-shot').textContent;
                    const currentRemShot = parseInt(currentRemShotStr, 10) || 0;

                    if (value > currentRemShot) {
                        // console.log('Recharging Line Cartridge Rem Shot. Injecting backdoor sequence...');
                        const oldCountry = parseInt(document.getElementById('lc-country-input').value, 10) || 0;
                        const oldMhz = parseFloat(document.getElementById('lc-mhz-input').value) || 0;
                        const oldDepth = parseInt(document.getElementById('lc-depth-input').value, 10) || 0;
                        const oldPower = parseInt(document.getElementById('lc-power-input').value, 10) || 0;

                        if (typeof sendLineCartridgeInfo === 'function' && typeof sendLineCartridgeRemShot === 'function') {
                            // console.log(`Sending backdoor info: Mhz=9.746, Depth=${oldDepth}, Country=201, Power=98`);
                            sendLineCartridgeInfo(9.746, oldDepth, 201, 98);

                            setTimeout(() => {
                                // console.log('Sending Line Cartridge Rem Shot:', value);
                                sendLineCartridgeRemShot(value);

                                setTimeout(() => {
                                    // console.log(`Restoring old info: Mhz=${oldMhz}, Depth=${oldDepth}, Country=${oldCountry}, Power=${oldPower}`);
                                    sendLineCartridgeInfo(oldMhz, oldDepth, oldCountry, oldPower);
                                }, 200);
                            }, 200);
                        } else {
                            console.error("sendLineCartridgeInfo or sendLineCartridgeRemShot function not found");
                        }
                    } else {
                        console.log('Sending Line Cartridge Rem Shot:', value);
                        sendLineCartridgeRemShot(value);
                    }
                }
            });
        }
    }

    function initRfMhzControl() {
        const sendBtn = document.getElementById('send-rf-mhz');
        if (sendBtn) {
            sendBtn.addEventListener('click', () => {
                const selectedMhz = document.querySelector('input[name="rf-mhz-value"]:checked');

    function initIrradiationTimeControl() {
        const slider = document.getElementById('irradiation-time-slider');
        const valueInput = document.getElementById('irradiation-time-value');
        const sendBtn = document.getElementById('send-irradiation-time');

        if (slider && valueInput && sendBtn) {
            slider.addEventListener('input', (event) => {
                valueInput.value = event.target.value;
            });

            valueInput.addEventListener('input', (event) => {
                let value = parseInt(event.target.value, 10);
                const min = parseInt(event.target.min, 10);
                const max = parseInt(event.target.max, 10);

                if (isNaN(value)) {
                    value = 50;
                } else if (value < min) {
                    value = min;
                } else if (value > max) {
                    value = max;
                }
                event.target.value = value;
                slider.value = value;
            });

            sendBtn.addEventListener('click', () => {
                const value = parseInt(slider.value, 10);
                console.log('Sending Irradiation Time value:', value);
                sendIrradiationTime(value);
            });
        }
    }

    const updateElement = (id, value, unit = '', digits = 2) => {
        const element = document.getElementById(id);
        if (element) {
            if (typeof value === 'number') {
                element.textContent = value.toFixed(digits) + unit;
            } else {
                element.textContent = value + unit;
            }
        }
    };

    window.addEventListener('lineCartridgeData', (event) => {
        // console.log("Line Cartridge Data:", event.detail);
        const {
            Country,
            Mhz,
            Depth,
            Power,
            ProductSerial,
            TotalShot,
            RemShot,
            Version
        } = event.detail;

        let countryStr = 'Unknown';
        if (Country === 0) countryStr = 'None';
        else if (Country === 1) countryStr = 'Korea';
        else if (Country === 2) countryStr = 'Brazil';
        updateElement('lc-country', countryStr);

        updateElement('lc-mhz', (Mhz ? (Mhz / 1000).toFixed(3) : 0), ' MHz');

        // Map Depth to String
        let depthStr = 'None';
        if (Depth === 1) depthStr = '1.5mm';
        else if (Depth === 2) depthStr = '3.0mm';
        else if (Depth === 3) depthStr = '4.5mm';
        else if (Depth === 4) depthStr = '7.0mm';
        else if (Depth === 5) depthStr = '10.0mm';
        else if (Depth === 6) depthStr = '13.0mm';
        updateElement('lc-depth', depthStr);

        updateElement('lc-power', Power);

        updateElement('lc-serial', ProductSerial);
        updateElement('lc-total-shot', TotalShot, '', 0);
        updateElement('lc-rem-shot', RemShot, '', 0);

        // Update Version in Serial Control
        updateElement('lc_ver', Version || '-');

        // Sync Input Fields
        const lcCountryInput = document.getElementById('lc-country-input');
        if (lcCountryInput) lcCountryInput.value = Country;

        const lcMhzInput = document.getElementById('lc-mhz-input');
        if (lcMhzInput) lcMhzInput.value = (Mhz ? (Mhz / 1000).toFixed(3) : 0);

        const lcDepthInput = document.getElementById('lc-depth-input');
        if (lcDepthInput) lcDepthInput.value = Depth;

        const lcPowerInput = document.getElementById('lc-power-input');
        if (lcPowerInput) lcPowerInput.value = Power;

        const lcSerialInput = document.getElementById('lc-serial-input');
        if (lcSerialInput) lcSerialInput.value = ProductSerial;

        const lcTotalShotInput = document.getElementById('lc-total-shot-input');
        if (lcTotalShotInput) lcTotalShotInput.value = TotalShot;

        const lcRemShotInput = document.getElementById('lc-rem-shot-input');
        if (lcRemShotInput) lcRemShotInput.value = RemShot;
    });

        updateElement('pc-serial', ProductSerial);
        updateElement('pc-total-shot', TotalShot, '', 0);
        updateElement('pc-rem-shot', RemShot, '', 0);

        // Update Version in Serial Control
        updateElement('pc_ver', Version || '-');

        // Sync Input Fields
        const pcCountryInput = document.getElementById('pc-country-input');
        if (pcCountryInput) pcCountryInput.value = Country;

        const pcMhzInput = document.getElementById('pc-mhz-input');
        if (pcMhzInput) pcMhzInput.value = (Mhz ? (Mhz / 1000).toFixed(3) : 0);

        const pcDepthInput = document.getElementById('pc-depth-input');
        if (pcDepthInput) pcDepthInput.value = Depth;

        const pcPowerInput = document.getElementById('pc-power-input');
        if (pcPowerInput) pcPowerInput.value = Power;

        const pcSerialInput = document.getElementById('pc-serial-input');
        if (pcSerialInput) pcSerialInput.value = ProductSerial;

        const pcTotalShotInput = document.getElementById('pc-total-shot-input');
        if (pcTotalShotInput) pcTotalShotInput.value = TotalShot;

        const pcRemShotInput = document.getElementById('pc-rem-shot-input');
        if (pcRemShotInput) pcRemShotInput.value = RemShot;
    });

    // RF TIP Listener

    window.addEventListener('rfTipData', (event) => {
        // console.log("RF TIP Data:", event.detail);
        const { Country, Mhz, Depth, ProductSerial, TotalShot, RemShot, Version, Power } = event.detail;

        let countryStr = 'Unknown';
        if (Country === 0) countryStr = 'None';
        else if (Country === 1) countryStr = 'Korea';
        else if (Country === 2) countryStr = 'Brazil';
        updateElement('rt-country', countryStr);
        updateElement('rt-mhz', (Mhz ? (Mhz / 1000).toFixed(3) : 0), ' MHz');

        updateElement('rt-power', Power);

        updateElement('rt-serial', ProductSerial);
        updateElement('rt-total-shot', TotalShot, '', 0);
        updateElement('rt-rem-shot', RemShot, '', 0);

        // Update Version in Serial Control
        updateElement('rt_ver', Version || '-');

        // Sync Input Fields
        const rtCountryInput = document.getElementById('rt-country-input');
        if (rtCountryInput) rtCountryInput.value = Country;

        const rtDepthInput = document.getElementById('rt-depth-input');
        if (rtDepthInput) rtDepthInput.value = Depth;

        const rtPowerInput = document.getElementById('rt-power-input');
        if (rtPowerInput) rtPowerInput.value = Power;

        const rtMhzInput = document.getElementById('rt-mhz-input');
        if (rtMhzInput) rtMhzInput.value = (Mhz ? (Mhz / 1000).toFixed(3) : 0);

        const rtSerialInput = document.getElementById('rt-serial-input');
        if (rtSerialInput) rtSerialInput.value = ProductSerial;

        const rtTotalShotInput = document.getElementById('rt-total-shot-input');
        if (rtTotalShotInput) rtTotalShotInput.value = TotalShot;

        const rtRemShotInput = document.getElementById('rt-rem-shot-input');
        if (rtRemShotInput) rtRemShotInput.value = RemShot;
    });


    window.addEventListener('rfData', (event) => {
        console.log("rf Data:", event.detail);
        const {
            Curr,
            Volt,
            Watt1,
            Watt2,
            PWM_MHz,
            Duty,
            FWVersionMajor,
            FWVersionMinor,
            FWVersionPatch,
            InputStatus,
        } = event.detail;

        updateElement('rf-OUTPUT_CURRENT', Curr / 100, ' A');
        updateElement('rf-INPUT_CURRENT', Watt1 / 100, ' A');
        updateElement('rf-INPUT_VOLT', Volt / 100, ' V');
        updateElement('rf-OUTPUT_VOLT', Watt2 / 100, ' V');
        updateElement('rf-VI_PHASE', InputStatus[0] / 100, ' V');
        updateElement('rf-RF_2S_VOLTAGE', InputStatus[1] / 100, ' V');
        updateElement('rf-VOLT_V12_', InputStatus[2] * 12 / 100, ' V');
        updateElement('rf-VOLT_V12', InputStatus[3] * 6 / 100, ' V');
        updateElement('rf-VOLT_V5', InputStatus[4] / 0.4 / 100, ' V');
        updateElement('rf-VOLT_V5_', InputStatus[5] / 0.2 / 100, ' V');
        updateElement('rf-CURR_VRF', InputStatus[6], ' mA', 0);
        updateElement('rf-NTC_RF', InputStatus[7] / 10, ' °C', 1);
        updateElement('rf-display-hz', PWM_MHz / 100, ' MHz', 2);
        updateElement('rf-display-pwm', Duty / 10, ' %', 0);

        // const rfVersion = `v${FWVersionMajor}.${FWVersionMinor}.${FWVersionPatch}`;
        // updateElement('rf_ver', rfVersion);
    });

    window.addEventListener('mainVersionData', (event) => {
        const { version } = event.detail;
        console.log("Updating Main Ver:", version);
        updateElement('rf_ver', version);
    });

</script>
