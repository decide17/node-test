<div class="container mx-auto my-3 px-4">

    <div class="bg-white shadow-sm rounded-lg overflow-hidden mb-4">

            <button id="lc-scan-btn"

        </div>
        <div class="p-4">
            <!-- Settings Section -->
            <!-- Settings Section -->
            <div class="grid grid-cols-1 lg:grid-cols-4 gap-4 mb-4">
                <!-- Country Setting -->
                <div class="border p-2 rounded">

                            class="shadow-sm focus:ring-indigo-500 focus:border-indigo-500 flex-1 block min-w-0 sm:text-sm border-gray-300 rounded-md">
                            <option value="0">None</option>
                            <option value="1">Korea</option>
                            <option value="2">Brazil</option>
                        </select>

                        <span id="lc-country"
                            class="ml-2 text-sm font-bold inline-block py-1 px-2 rounded bg-blue-100 text-blue-800 border border-blue-200">-</span>
                    </div>

                <div class="border p-2 rounded">
