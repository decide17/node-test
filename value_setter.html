<!-- Button to trigger modal -->
<button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#valueModal">
  값 설정
</button>

<!-- Modal -->
<div class="modal fade" id="valueModal" tabindex="-1" aria-labelledby="valueModalLabel" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="valueModalLabel">값 설정 (1-100)</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="frequency-select" class="form-label">주파수 선택</label>
          <select class="form-select" id="frequency-select">
            <option value="200">200 kHz</option>
            <option value="100">100 kHz</option>
            <option value="50">50 kHz</option>
          </select>
        </div>
        <div class="mb-3">
          <label for="value-slider" class="form-label">값 선택 (1-100)</label>
          <div class="d-flex align-items-center">
            <input type="range" class="form-range w-75 me-3" min="1" max="100" id="value-slider" value="50">
            <input type="number" class="form-control" min="1" max="100" id="value-input" value="50" style="width: 80px;">
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">닫기</button>
        <button type="button" class="btn btn-primary" id="send-value-btn">전송</button>
      </div>
    </div>
  </div>
</div>
